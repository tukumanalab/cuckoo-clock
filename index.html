<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳩時計ディスクジェネレーター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="https://github.com/tukumanalab/cuckoo-clock" class="github-ribbon" target="_blank" rel="noopener" aria-label="GitHub リポジトリ">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" aria-hidden="true">
      <path d="M0 0l115 115h15l12 27 108 108V0z" fill="#151513"/>
      <path class="octo-arm" d="M128 109c-15-9-9-19-9-19 3-7 2-11 2-11-1-7 3-2 3-2 4 5 2 11 2 11-3 10 5 15 9 16" fill="#fff" style="transform-origin:130px 106px"/>
      <path class="octo-body" d="M115 115s4 2 5 0l14-14c3-2 6-3 8-3-8-11-15-24 2-41 5-5 10-7 16-7 1-2 3-7 12-11 0 0 5 3 7 16 4 2 8 5 12 9s7 8 9 12c14 3 17 7 17 7-4 8-9 11-11 11 0 6-2 11-7 16-16 16-30 10-41 2 0 3-1 7-5 11l-12 11c-1 1 1 5 1 5z" fill="#fff"/>
    </svg>
  </a>
  <div class="card">
    <h1>鳩時計ディスクジェネレーター</h1>

    <!-- Melody editor -->
    <div id="melody-editor">
      <div class="melody-header">
        <button class="play-btn" id="playBtn">▶ 試聴</button>
        <div class="header-actions">
          <button class="load-btn" id="loadBtn">ファイル読込</button>
          <button class="save-btn" id="saveBtn">ファイル保存</button>
          <button class="clear-btn" id="clearBtn">全部クリア</button>
        </div>
      </div>
      <input type="file" id="loadFile" accept=".txt,text/plain" hidden>
      <div id="piano-roll"></div>
      <p style="font-size:0.72rem; color:#94a3b8; margin-bottom:8px;">
        セルをクリックして音を選択。別のセルをクリックするとそのビートの音が変わります。
      </p>
    </div>

    <p class="marker-note">
      <span class="marker-note__icon">▲</span>
      中央穴の三角の切り込みが、曲のスタート地点（始点）です。
    </p>
    <div id="preview-container"></div>
    <p class="preview-hint">ドラッグで回転 · スクロールでズーム</p>

    <div class="download-row">
      <button id="downloadBtn">STL をダウンロード</button>
      <button id="downloadSvgBtn">SVG をダウンロード</button>
      <button id="downloadPdfBtn">PDF をダウンロード</button>
    </div>

    <footer class="site-footer">
      <a href="https://sites.google.com/view/tukumanalab/" target="_blank" rel="noopener">青学つくまなラボ</a>
      <span class="site-footer__sep">·</span>
      <a href="https://github.com/tukumanalab/cuckoo-clock" target="_blank" rel="noopener">GitHub</a>
    </footer>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "jspdf": "https://cdn.jsdelivr.net/npm/jspdf@2.5.2/+esm",
      "svg2pdf.js": "https://cdn.jsdelivr.net/npm/svg2pdf.js@2.2.3/+esm"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
