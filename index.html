<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳩時計ディスクジェネレーター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>鳩時計ディスクジェネレーター</h1>
    <p class="subtitle">3Dプリント用 STL ファイルをダウンロードできます</p>

    <!-- Melody editor -->
    <div id="melody-editor">
      <div class="melody-header">
        <button class="play-btn" id="playBtn">▶ 試聴</button>
        <button class="clear-btn" id="clearBtn">全部クリア</button>
      </div>
      <div id="piano-roll"></div>
      <p style="font-size:0.72rem; color:#94a3b8; margin-bottom:8px;">
        セルをクリックして音を選択。別のセルをクリックするとそのビートの音が変わります。
      </p>
    </div>

    <div id="preview-container"></div>
    <p class="preview-hint">ドラッグで回転 · スクロールでズーム</p>

    <button id="downloadBtn">STL をダウンロード</button>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
